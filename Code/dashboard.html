<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – EcoAction</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .dash-stat { border-radius:12px;padding:22px;color:white;position:relative;overflow:hidden; }
    .dash-stat::after { content:'';position:absolute;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.12);right:-15px;bottom:-15px; }
    .dash-stat h3 { font-size:2rem;font-weight:800;margin:0 0 4px; }
    .dash-stat p  { font-size:.82rem;margin:0;opacity:.85; }
    .init-row { background:white;border-radius:10px;padding:16px;border:1.5px solid var(--border);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px; }
    .init-row h6 { margin:0 0 3px;font-size:.9rem;font-weight:700; }
    .init-row small { color:var(--text-muted); }
    .badge-earned { background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:14px;text-align:center;transition:.2s; }
    .badge-earned:hover { border-color:var(--green-light); }
    .badge-earned span { font-size:1.8rem;display:block;margin-bottom:4px; }
    .badge-earned small { font-size:.75rem;color:var(--text-muted); }
    .activity-item { display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:.85rem; }
    .activity-item:last-child { border-bottom:none; }
  </style>
</head>
<body style="background:var(--cream);">

<nav class="navbar navbar-expand-lg eco-nav">
  <div class="container">
    <a class="navbar-brand" href="index.html"><div class="brand-icon"><i class="fas fa-leaf"></i></div>EcoAction</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav mx-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="initiatives.html">Initiatives</a></li>
        <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
        <li class="nav-item"><a class="nav-link" href="create.html">+ New Initiative</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2">
        <span id="userNameNav" style="color:#2D6A4F;font-weight:600;margin-right:10px;"></span>
        <a href="#" id="logoutBtn" class="nav-login">Logout</a>
      </div>
    </div>
  </div>
</nav>

<!-- Welcome -->
<div style="background:linear-gradient(135deg,#2D6A4F,#52B788);padding:32px 0;">
  <div class="container d-flex align-items-center gap-3">
    <div style="width:56px;height:56px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;border:2px solid rgba(255,255,255,.4);"><i class="fas fa-user" style="color:white;"></i></div>
    <div>
      <h4 id="welcomeMessage" style="color:white;margin:0;font-weight:700;">Welcome!</h4>
      <p id="memberInfo" style="color:rgba(255,255,255,.75);margin:4px 0 0;font-size:.88rem;"></p>
    </div>
  </div>
</div>

<section style="padding:32px 0 60px;">
  <div class="container">
    <!-- Stats -->
    <div class="row g-3 mb-4" id="dashboardStatsContainer">
      <!-- Stats loaded dynamically from database -->
    </div>

    <div class="row g-4">
      <!-- My Initiatives -->
      <div class="col-lg-8">
        <div class="bg-white rounded-4 p-4 shadow-sm mb-4">
          <h5 style="color:var(--green-dark);font-weight:700;margin-bottom:16px;">My Events</h5>
          <div id="myEventsContainer">
            <!-- Events will be loaded here -->
          </div>
          <div style="text-align:center;padding:20px;color:var(--text-muted);" id="noEventsMsg">
            No events yet. Create one to get started!
          </div>
          <div class="mt-3">
            <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#eventModal">+ Add New Event</button>
          </div>
        </div>

        <!-- Badges -->
        <div class="bg-white rounded-4 p-4 shadow-sm">
          <h5 style="color:var(--green-dark);font-weight:700;margin-bottom:16px;">Quick Links</h5>
          <div class="row g-2">
            <div class="col-12">
              <a href="initiatives.html" class="btn btn-outline-success w-100 btn-sm">Browse All Initiatives</a>
            </div>
            <div class="col-12">
              <a href="events.html" class="btn btn-outline-success w-100 btn-sm">Browse All Events</a>
            </div>
            <div class="col-12">
              <a href="create.html" class="btn btn-success w-100 btn-sm">Create New Initiative</a>
            </div>
          </div>
        </div>
      </div>

      <!-- Activity -->
      <div class="col-lg-4">
        <div class="bg-white rounded-4 p-4 shadow-sm">
          <h5 style="color:var(--green-dark);font-weight:700;margin-bottom:16px;">Account Info</h5>
          <div class="activity-item">
            <div>
              <strong>Email:</strong><br>
              <span id="accountEmail" style="color:#888;font-size:.9rem;"></span>
            </div>
          </div>
          <div class="activity-item">
            <div>
              <strong>Member Since:</strong><br>
              <span id="memberSince" style="color:#888;font-size:.9rem;"></span>
            </div>
          </div>
          <div class="activity-item">
            <div>
              <button class="btn btn-danger btn-sm w-100" id="logoutDashBtn">Logout</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Add Event Modal -->
<div class="modal fade" id="eventModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add New Event</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="eventFormModal">
          <div class="mb-3">
            <label class="form-label">Event Title</label>
            <input type="text" class="form-control" id="eventTitle" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="eventDescr" rows="3" required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Date & Time</label>
            <input type="datetime-local" class="form-control" id="eventDate" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" class="form-control" id="eventLoc" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Image URL</label>
            <input type="text" class="form-control" id="eventImg" />
          </div>
          <button type="submit" class="btn btn-success w-100">Create Event</button>
        </form>
      </div>
    </div>
  </div>
</div>

<button id="scrollTop" class="scroll-top"><i class="fas fa-arrow-up"></i></button>
<div id="ecoToast" class="eco-toast"><i class="fas fa-leaf"></i><span class="toast-msg"></span></div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
