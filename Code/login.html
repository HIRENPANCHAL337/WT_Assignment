<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – EcoAction</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

<nav class="navbar navbar-expand-lg eco-nav">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <div class="brand-icon"><i class="fas fa-leaf"></i></div>EcoAction
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav mx-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="initiatives.html">Initiatives</a></li>
        <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2">
        <a href="login.html" class="nav-login">Login</a>
        <a href="register.html" class="btn-join-nav">Join Now</a>
      </div>
    </div>
  </div>
</nav>

<div class="d-flex align-items-center justify-content-center" style="min-height:88vh;padding:40px 16px;">
  <div style="width:100%;max-width:500px;">

    <!-- Logo + Title -->
    <div class="text-center mb-4">
      <div class="auth-logo-circle fade-up">
        <i class="fas fa-leaf"></i>
      </div>
      <h2 class="auth-title fade-up delay-1">Welcome</h2>
      <p class="auth-subtitle fade-up delay-2">Log in to continue your environmental journey</p>
    </div>

    <!-- Card -->
    <div class="auth-card fade-up delay-2">
      <p class="auth-card-title">Sign In</p>
      <p class="auth-card-sub">Enter your credentials to access your account</p>

      <form id="loginForm">
        <div class="mb-3">
          <label class="eco-label">Email Address</label>
          <div class="input-icon-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="eco-input" id="loginEmail" placeholder="john@example.com" required />
          </div>
        </div>
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="eco-label mb-0">Password</label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <div class="input-icon-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="eco-input" id="loginPw" placeholder="••••••••" required />
          </div>
        </div>
        <button type="submit" class="btn-signin mt-2" id="loginBtn">Sign In</button>
      </form>

      <p class="text-center mt-4 mb-0" style="font-size:.88rem;color:var(--text-muted);">
        Don't have an account? <a href="register.html" style="color:var(--green-dark);font-weight:600;">Sign up</a>
      </p>
    </div>

  </div>
</div>

<div id="ecoToast" class="eco-toast"><i class="fas fa-leaf"></i><span class="toast-msg"></span></div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
